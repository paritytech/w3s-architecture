name: Deployment Map Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  preview:
    name: Generate map diff
    runs-on: ubuntu-latest

    steps:
      - name: Install render tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends librsvg2-bin

      - name: Checkout base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: head

      - name: Compare committed deployment map assets
        id: asset-diff
        run: |
          set -euo pipefail

          mkdir -p preview

          before_asset="deployment-map.svg"
          if [[ ! -f "base/$before_asset" ]]; then
            before_asset="deployment-map.png"
          fi

          after_asset="deployment-map.svg"
          if [[ ! -f "head/$after_asset" ]]; then
            after_asset="deployment-map.png"
          fi

          echo "before_asset=$before_asset" >> "$GITHUB_OUTPUT"
          echo "after_asset=$after_asset" >> "$GITHUB_OUTPUT"

          if [[ -f base/deployment-map.svg && -f head/deployment-map.svg ]]; then
            compare_asset="deployment-map.svg"
          elif [[ -f base/deployment-map.png && -f head/deployment-map.png ]]; then
            compare_asset="deployment-map.png"
          else
            echo "No comparable deployment map asset found in base and PR checkouts" >&2
            exit 1
          fi

          cp "base/$before_asset" "preview/main.${before_asset##*.}"
          cp "head/$after_asset" "preview/pr.${after_asset##*.}"

          if cmp -s "base/$compare_asset" "head/$compare_asset"; then
            echo "asset_diff=false" >> "$GITHUB_OUTPUT"
          else
            echo "asset_diff=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check generated deployment map assets
        id: generated-assets
        run: |
          set -euo pipefail

          if [[ ! -x head/scripts/generate.sh ]]; then
            echo "scripts/generate.sh is missing or not executable in the PR checkout" >&2
            exit 1
          fi

          cp head/deployment-map.png preview/committed-pr.png
          if [[ -f head/deployment-map.svg ]]; then
            cp head/deployment-map.svg preview/committed-pr.svg
          fi

          head/scripts/generate.sh "$PWD/head"

          cp head/deployment-map.png preview/generated-pr.png
          if [[ -f head/deployment-map.svg ]]; then
            cp head/deployment-map.svg preview/generated-pr.svg
          fi

          if git -C head diff --quiet -- deployment-map.svg; then
            echo "stale=false" >> "$GITHUB_OUTPUT"
          else
            git -C head diff --name-only -- deployment-map.svg > preview/stale-export-assets.txt
            echo "stale=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload generated assets
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: deployment-map-preview-pr-${{ github.event.pull_request.number }}
          path: preview/
          if-no-files-found: error
          retention-days: 14

      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          ASSET_DIFF: ${{ steps.asset-diff.outputs.asset_diff }}
          BEFORE_ASSET: ${{ steps.asset-diff.outputs.before_asset }}
          AFTER_ASSET: ${{ steps.asset-diff.outputs.after_asset }}
          EXPORT_STALE: ${{ steps.generated-assets.outputs.stale }}
        with:
          script: |
            const marker = "<!-- deployment-map-preview -->";
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const baseSha = pr.base.sha;
            const headSha = pr.head.sha;
            const headRepo = pr.head.repo.full_name;
            const beforeAsset = process.env.BEFORE_ASSET || "deployment-map.svg";
            const afterAsset = process.env.AFTER_ASSET || "deployment-map.svg";

            const beforeUrl = `https://github.com/${owner}/${repo}/blob/${baseSha}/${beforeAsset}?raw=1`;
            const afterUrl = `https://github.com/${headRepo}/blob/${headSha}/${afterAsset}?raw=1`;
            const artifactUrl = process.env.ARTIFACT_URL;
            const assetDiff = process.env.ASSET_DIFF === "true";
            const exportStale = process.env.EXPORT_STALE === "true";

            const body = [
              marker,
              "### Deployment Map Preview",
              "",
              ...(assetDiff
                ? [
                    "Deployment Map Asset diff detected.",
                    "",
                    "**Before (main)**",
                    "",
                    `<img src="${beforeUrl}" width="900" alt="Deployment map before" />`,
                    "",
                    "**After (PR)**",
                    "",
                    `<img src="${afterUrl}" width="900" alt="Deployment map after" />`,
                    "",
                    `[Download generated assets](${artifactUrl})`,
                  ]
                : [
                    "no Deployment Map Asset diff detected",
                    "",
                    `[Download generated assets](${artifactUrl})`,
                  ]),
              ...(exportStale
                ? [
                    "",
                    "⚠️ Please run `bash scripts/generate.sh` to sync Deployment Map export assets!",
                  ]
                : []),
            ].join("\n");

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const existing = comments.data.find((comment) =>
              comment.user.type === "Bot" && comment.body && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body,
              });
            }
