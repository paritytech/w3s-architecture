name: Deployment Map Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  preview:
    name: Generate map diff
    runs-on: ubuntu-latest

    steps:
      - name: Install render tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends imagemagick librsvg2-bin

      - name: Checkout base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: head

      - name: Compare committed deployment map assets
        id: asset-diff
        run: |
          set -euo pipefail

          mkdir -p preview

          if [[ ! -f base/deployment-map.png || ! -f head/deployment-map.png ]]; then
            echo "deployment-map.png is missing from base or PR checkout" >&2
            exit 1
          fi

          cp base/deployment-map.png preview/main.png
          cp head/deployment-map.png preview/pr.png

          if cmp -s preview/main.png preview/pr.png; then
            echo "asset_diff=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "asset_diff=true" >> "$GITHUB_OUTPUT"

          before_w="$(identify -format '%w' preview/main.png)"
          before_h="$(identify -format '%h' preview/main.png)"
          after_w="$(identify -format '%w' preview/pr.png)"
          after_h="$(identify -format '%h' preview/pr.png)"

          width="$before_w"
          if (( after_w > width )); then width="$after_w"; fi

          height="$before_h"
          if (( after_h > height )); then height="$after_h"; fi

          convert preview/main.png -background '#f5f5f7' -gravity northwest -extent "${width}x${height}" preview/main-normalized.png
          convert preview/pr.png -background '#f5f5f7' -gravity northwest -extent "${width}x${height}" preview/pr-normalized.png

          set +e
          compare -metric AE preview/main-normalized.png preview/pr-normalized.png preview/diff.png 2> preview/changed-pixels.txt
          compare_status="$?"
          set -e

          if (( compare_status > 1 )); then
            exit "$compare_status"
          fi

      - name: Check generated deployment map assets
        id: generated-assets
        run: |
          set -euo pipefail

          if [[ ! -x head/scripts/generate.sh ]]; then
            echo "scripts/generate.sh is missing or not executable in the PR checkout" >&2
            exit 1
          fi

          cp head/deployment-map.png preview/committed-pr.png
          if [[ -f head/deployment-map.svg ]]; then
            cp head/deployment-map.svg preview/committed-pr.svg
          fi

          head/scripts/generate.sh "$PWD/head"

          cp head/deployment-map.png preview/generated-pr.png
          if [[ -f head/deployment-map.svg ]]; then
            cp head/deployment-map.svg preview/generated-pr.svg
          fi

          if git -C head diff --quiet -- deployment-map.svg; then
            echo "stale=false" >> "$GITHUB_OUTPUT"
          else
            git -C head diff --name-only -- deployment-map.svg > preview/stale-export-assets.txt
            echo "stale=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload generated assets
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: deployment-map-preview-pr-${{ github.event.pull_request.number }}
          path: preview/
          if-no-files-found: error
          retention-days: 14

      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          ASSET_DIFF: ${{ steps.asset-diff.outputs.asset_diff }}
          EXPORT_STALE: ${{ steps.generated-assets.outputs.stale }}
        with:
          script: |
            const marker = "<!-- deployment-map-preview -->";
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const baseSha = pr.base.sha;
            const headSha = pr.head.sha;
            const headRepo = pr.head.repo.full_name;

            const beforeUrl = `https://github.com/${owner}/${repo}/blob/${baseSha}/deployment-map.png?raw=1`;
            const afterUrl = `https://github.com/${headRepo}/blob/${headSha}/deployment-map.png?raw=1`;
            const artifactUrl = process.env.ARTIFACT_URL;
            const assetDiff = process.env.ASSET_DIFF === "true";
            const exportStale = process.env.EXPORT_STALE === "true";

            const body = [
              marker,
              "### Deployment Map Preview",
              "",
              ...(assetDiff
                ? [
                    "Deployment Map Asset diff detected.",
                    "",
                    "**Before (main)**",
                    "",
                    `<img src="${beforeUrl}" width="900" alt="Deployment map before" />`,
                    "",
                    "**After (PR)**",
                    "",
                    `<img src="${afterUrl}" width="900" alt="Deployment map after" />`,
                    "",
                    `[Download the generated difference image and assets](${artifactUrl})`,
                  ]
                : [
                    "no Deployment Map Asset diff detected",
                    "",
                    `[Download generated assets](${artifactUrl})`,
                  ]),
              ...(exportStale
                ? [
                    "",
                    "⚠️ Please run `bash scripts/generate.sh` to sync Deployment Map export assets!",
                  ]
                : []),
            ].join("\n");

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const existing = comments.data.find((comment) =>
              comment.user.type === "Bot" && comment.body && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body,
              });
            }
