name: Deployment Map Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  preview:
    name: Generate map diff
    runs-on: ubuntu-latest
    env:
      # Set to "png" if GitHub's SVG rendering is less useful in PR comments.
      PREVIEW_FORMAT: svg

    steps:
      - name: Install render tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends imagemagick librsvg2-bin

      - name: Checkout base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: head

      - name: Generate before and after map assets
        run: |
          set -euo pipefail

          mkdir -p preview

          if [[ -x head/scripts/generate.sh ]]; then
            GENERATE=head/scripts/generate.sh
          elif [[ -x base/scripts/generate.sh ]]; then
            GENERATE=base/scripts/generate.sh
          else
            echo "No generate.sh found in base or PR checkout" >&2
            exit 1
          fi

          "$GENERATE" "$PWD/base"
          "$GENERATE" "$PWD/head"

          cp base/deployment-map.png preview/before.png
          cp head/deployment-map.png preview/after.png
          if [[ -f base/deployment-map.svg ]]; then cp base/deployment-map.svg preview/before.svg; fi
          if [[ -f head/deployment-map.svg ]]; then cp head/deployment-map.svg preview/after.svg; fi

      - name: Choose inline preview format
        id: format
        run: |
          set -euo pipefail

          format="$PREVIEW_FORMAT"
          if [[ "$format" != "svg" && "$format" != "png" ]]; then
            echo "PREVIEW_FORMAT must be either svg or png" >&2
            exit 1
          fi

          if [[ ! -f "base/deployment-map.$format" || ! -f "head/deployment-map.$format" ]]; then
            echo "deployment-map.$format is missing from base or head; falling back to png"
            format="png"
          fi

          echo "format=$format" >> "$GITHUB_OUTPUT"

      - name: Create visual diff
        id: diff
        run: |
          set -euo pipefail

          before_w="$(identify -format '%w' preview/before.png)"
          before_h="$(identify -format '%h' preview/before.png)"
          after_w="$(identify -format '%w' preview/after.png)"
          after_h="$(identify -format '%h' preview/after.png)"

          width="$before_w"
          if (( after_w > width )); then width="$after_w"; fi

          height="$before_h"
          if (( after_h > height )); then height="$after_h"; fi

          convert preview/before.png -background '#f5f5f7' -gravity northwest -extent "${width}x${height}" preview/before-normalized.png
          convert preview/after.png -background '#f5f5f7' -gravity northwest -extent "${width}x${height}" preview/after-normalized.png

          compare -metric AE preview/before-normalized.png preview/after-normalized.png preview/diff.png 2> preview/changed-pixels.txt || true

          changed_pixels="$(cat preview/changed-pixels.txt)"
          echo "changed_pixels=${changed_pixels:-0}" >> "$GITHUB_OUTPUT"

      - name: Upload generated assets
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: deployment-map-preview-pr-${{ github.event.pull_request.number }}
          path: preview/
          if-no-files-found: error
          retention-days: 14

      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          CHANGED_PIXELS: ${{ steps.diff.outputs.changed_pixels }}
          PREVIEW_FORMAT: ${{ steps.format.outputs.format }}
        with:
          script: |
            const marker = "<!-- deployment-map-preview -->";
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const baseSha = pr.base.sha;
            const headSha = pr.head.sha;
            const headRepo = pr.head.repo.full_name;
            const previewFormat = process.env.PREVIEW_FORMAT || "svg";

            const beforeUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${baseSha}/deployment-map.${previewFormat}`;
            const afterUrl = `https://raw.githubusercontent.com/${headRepo}/${headSha}/deployment-map.${previewFormat}`;
            const changedPixels = process.env.CHANGED_PIXELS || "0";
            const artifactUrl = process.env.ARTIFACT_URL;

            const body = `${marker}
            ### Deployment Map Preview

            Inline preview format: \`${previewFormat}\`
            Changed pixels in generated visual diff: \`${changedPixels}\`

            | Before | After |
            | --- | --- |
            | <img src="${beforeUrl}" width="420" alt="Deployment map before" /> | <img src="${afterUrl}" width="420" alt="Deployment map after" /> |

            [Download generated before/after assets and visual diff](${artifactUrl})

            _The inline images are checked-in deployment-map.${previewFormat} files at the base and PR commits. The artifact contains freshly generated SVG/PNG assets and the generated visual diff for this workflow run._`;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const existing = comments.data.find((comment) =>
              comment.user.type === "Bot" && comment.body && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body,
              });
            }
