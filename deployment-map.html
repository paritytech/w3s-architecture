<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Polkadot Product — Deployment Dependency Map</title>
<style>
  :root {
    --pink: #e6007a;
    --pink-soft: #ffd6ec;
    --ink: #0d0d12;
    --paper: #f5f5f7;
    --card: #ffffff;
    --muted: #6b6b76;
    --line: #d9d9e0;
    --warn: #b25b00;
    --warn-bg: #fff4e3;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  header.page {
    padding: 28px 32px 22px;
    background: linear-gradient(180deg, #fff 0%, #fafafc 100%);
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: saturate(140%) blur(6px);
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; background: var(--pink); box-shadow: 0 0 0 4px var(--pink-soft); }
  header.page h1 { font-size: 22px; margin: 0; letter-spacing: -0.3px; }
  header.page p { margin: 6px 0 0; color: var(--muted); font-size: 13.5px; max-width: 980px; line-height: 1.5; }
  .flow-hint {
    margin-top: 14px;
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 12px; font-weight: 600; color: var(--pink);
    background: var(--pink-soft); padding: 6px 12px; border-radius: 999px;
  }
  .legend { margin-top: 14px; display: flex; gap: 20px; flex-wrap: wrap; font-size: 12px; color: var(--muted); }
  .legend span { display: inline-flex; align-items: center; gap: 7px; }
  .chip { width: 26px; height: 14px; border-radius: 4px; display: inline-block; }
  .chip.repo { background: var(--card); border: 1.5px solid var(--line); }
  .chip.norepo { background: var(--warn-bg); border: 1.5px dashed var(--warn); }
  .doc-badge {
    position: absolute;
    top: -7px;
    left: -7px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #c1262d;
    color: #fff;
    border: 2px solid var(--paper);
    font-size: 12px;
    font-weight: 800;
    line-height: 1;
    z-index: 2;
  }
  .legend .doc-badge {
    position: static;
    width: 16px;
    height: 16px;
    border-width: 0;
    font-size: 11px;
  }
  .chip.w3f { background: var(--card); border: 1.5px solid var(--line); box-shadow: inset 3px 0 0 #888; }

  .board {
    display: flex;
    flex-direction: row;   /* Layer 1 (foundation) on the LEFT, apps on the RIGHT */
    gap: 0;
    overflow-x: auto;
    padding: 26px 32px 56px;
    align-items: stretch;
  }
  .layer {
    flex: 1 0 300px;
    min-width: 300px;
    padding: 0 18px;
    border-right: 1px dashed var(--line);
    position: relative;
  }
  .layer:last-child { border-right: none; }
  .layer-head { margin-bottom: 16px; }
  .layer-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 8px;
    background: var(--ink); color: #fff; font-weight: 700; font-size: 14px;
  }
  .layer-title { font-size: 14.5px; font-weight: 700; margin: 10px 0 2px; letter-spacing: -0.2px; }
  .layer-sub { font-size: 12px; color: var(--muted); line-height: 1.45; }
  .order-tag {
    font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--pink); margin-bottom: 6px; display: block;
  }

  .cards { display: flex; flex-direction: column; gap: 7px; }
  .card {
    text-decoration: none;
    color: inherit;
    background: var(--card);
    border: 1.5px solid var(--line);
    border-radius: 9px;
    padding: 8px 11px;
    display: block;
    min-width: 0;
    position: relative;
    transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
  }
  .card.hasrepo:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 22px rgba(230,0,122,0.14);
    border-color: var(--pink);
  }
  .card .name { font-size: 13px; font-weight: 650; letter-spacing: -0.2px; display: flex; align-items: center; gap: 6px; min-width: 0; }
  .card .name .label { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card .tags { display: inline-flex; align-items: center; justify-content: flex-end; gap: 4px; flex: 0 0 auto; flex-wrap: wrap; }
  .card .repo { display: block; text-decoration: none; font-size: 11px; color: var(--muted); margin-top: 2px; font-family: ui-monospace, "SF Mono", Menlo, monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card .repo:hover { color: var(--pink); }
  .card .owner { font-size: 11px; color: #9a9aa4; margin-top: 5px; }
  .card .arrow { margin-left: auto; color: var(--pink); font-weight: 700; opacity: 0; transition: opacity .12s; }
  .card.hasrepo:hover .arrow { opacity: 1; }

  .card.norepo {
    background: var(--warn-bg);
    border: 1.5px dashed var(--warn);
    cursor: default;
  }
  .card.norepo .name {
    color: var(--warn);
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 8px;
  }
  .card.norepo .name .label {
    overflow: visible;
    text-overflow: clip;
    white-space: normal;
    line-height: 1.25;
  }
  .card.norepo .tags { align-self: center; max-width: 104px; }
  .tag {
    display: inline-flex;
    align-items: center;
    font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    padding: 2px 6px; border-radius: 5px; background: var(--warn); color: #fff;
    line-height: 1;
    white-space: nowrap;
    text-decoration: none;
  }
  .tag.w3f { background: #888; }

  .card.w3f { box-shadow: inset 3px 0 0 #888; }

  footer { padding: 18px 32px 40px; color: #9a9aa4; font-size: 11.5px; }
  footer code { font-family: ui-monospace, Menlo, monospace; }
</style>
</head>
<body>

<header class="page">
  <div class="brand"><span class="dot"></span><h1>Polkadot Product Ecosystem E2E Deployment Map</h1></div>
  <div class="legend">
    <span><i class="chip repo"></i> Repo + instructions available</span>
    <span><i class="chip norepo"></i> No repo yet — handoff gap</span>
    <span><i class="doc-badge">!</i> Missing deploy doc</span>
    <span><i class="chip w3f"></i> Deployed internally</span>
  </div>
</header>

<div class="board" id="board"></div>

<script>
// Layers ordered left-to-right. Layer 1 = foundation, apps/reference deployments later.
const LAYERS = [
  {
    num: 1,
    title: "Test Environment + Meta Setup",
    sub: "The chains and deployment prerequisites everything else depends on.",
    items: [
      { name: "Relay Chain + Asset Hub", repo: "https://github.com/paritytech/polkadot-sdk", w3f: true, deployDoc: "NA" },
      { name: "Polkadot Bulletin Chain", repo: "https://github.com/paritytech/polkadot-bulletin-chain", w3f: true, deployDoc: "NA" },
      { name: "Individuality (People Chain)", repo: "https://github.com/paritytech/individuality", w3f: true, deployDoc: "NA" },
      { name: "RevX", repo: "https://github.com/paritytech/revx", w3f: true, deployDoc: "NA" },
    ]
  },
  {
    num: 2,
    title: "Deployer Funding",
    sub: "Funding and account setup needed before first contract deployments.",
    items: [
      { name: "Deployer Funding Instructions", repo: null },
    ]
  },
  {
    num: 3,
    title: "Core Infrastructure",
    sub: "Backend services and on-chain plumbing the platform and apps call into.",
    items: [
      { name: "Identity backend", repo: "https://github.com/paritytech/identity-backend" },
      { name: "dotNS", repo: "https://github.com/paritytech/dotns" },
      { name: "dotNS-CLI", repo: "https://github.com/paritytech/dotns-sdk/tree/main#" },
    ]
  },
  {
    num: 4,
    title: "SDKs / Developer Packages",
    sub: "Packages that downstream deploy tooling, clients, and apps consume.",
    items: [
      { name: "Triangle-js SDK", repo: "https://github.com/paritytech/triangle-js-sdks" },
      { name: "Product SDK", repo: "https://github.com/paritytech/product-sdk" },
      { name: "Browse SDK", repo: "https://github.com/paritytech/browse/tree/main/packages/browse-sdk", repoLabel: "paritytech/browse · browse-sdk" },
    ]
  },
  {
    num: 5,
    title: "Deploy Tooling / Shared Services",
    sub: "Reusable deployment tools and workflows used by later repositories.",
    items: [
      { name: "Bulletin Deploy", repo: "https://github.com/paritytech/bulletin-deploy" },
      { name: "Contract Dependency Manager", repo: "https://github.com/paritytech/contract-dependency-manager", deployDoc: "https://github.com/paritytech/contract-dependency-manager/blob/main/DEPLOY_DOC.md" },
      { name: "Playground CLI", repo: "https://github.com/paritytech/playground-cli" },
    ]
  },
  {
    num: 6,
    title: "Platform Web / Desktop",
    sub: "Triangle clients that can be deployed before mobile app-store review.",
    items: [
      { name: "Polkadot Web (dot.li)", repo: "https://github.com/paritytech/dotli" },
      { name: "Polkadot Desktop", repo: "https://github.com/paritytech/polkadot-desktop" },
    ]
  },
  {
    num: 7,
    title: "Mobile Review Prerequisites",
    sub: "Products/config values mobile apps need available for app-store review.",
    items: [
      { name: "Attestation Protocol", repo: "https://github.com/paritytech/attestation-protocol" },
      { name: "Browse.dot", repo: "https://github.com/paritytech/browse" },
      { name: "W3S Conference App", repo: "https://github.com/paritytech/w3s-conference-app" },
      { name: "W3S Coin", repo: null, w3f: true },
    ]
  },
  {
    num: 8,
    title: "Mobile Apps",
    sub: "Mobile clients after review prerequisites and platform building blocks exist.",
    items: [
      { name: "Polkadot Mobile - iOS", repo: "https://github.com/paritytech/polkadot-app-ios-v2" },
      { name: "Polkadot Mobile - Android", repo: "https://github.com/paritytech/polkadot-app-android-v2" },
    ]
  },
  {
    num: 9,
    title: "Reference Implementations / Prototypes",
    sub: "End-user products and prototypes that consume the platform/tooling stack.",
    items: [
      { name: "dot.li starter", repo: "https://github.com/paritytech/dotli-starter" },
      { name: "Playground App", repo: "https://github.com/paritytech/playground-app" },
      { name: "Playground Constellation", repo: "https://github.com/paritytech/playground-constellation" },
      { name: "T3rminal", repo: "https://github.com/paritytech/t3rminal" },
      { name: "LocalDot", repo: "https://github.com/paritytech/p2p-market" },
      { name: "LinkTr33", repo: "https://github.com/paritytech/linktr33" },
      { name: "Sit3Drop", repo: "https://github.com/paritytech/dotdot-deployer" },
      { name: "Mercado", repo: "https://github.com/paritytech/mercado" },
      { name: "W3S Ticketing", repo: "https://github.com/paritytech/tick3t", w3f: true },
    ]
  },
  {
    num: 10,
    title: "Playground Sample Apps",
    sub: "Sample/template deployments that come after the Playground App.",
    items: [
      { name: "Simple Survey", repo: "https://github.com/paritytech/simple-survey" },
      { name: "Playground App Template", repo: "https://github.com/paritytech/playground-app-template" },
      { name: "Playground Tutorial", repo: "https://github.com/paritytech/playground-tutorial" },
      { name: "Rock Paper Scissors", repo: "https://github.com/paritytech/Rock-Paper-Scissors" },
      { name: "Feedback Board", repo: "https://github.com/paritytech/feedback-board" },
    ]
  },
];

const board = document.getElementById("board");

LAYERS.forEach((layer, idx) => {
  const col = document.createElement("div");
  col.className = "layer";

  col.innerHTML = `
    <div class="layer-head">
      <span class="layer-num">${layer.num}</span>
      <div class="layer-title">${layer.title}</div>
      <div class="layer-sub">${layer.sub}</div>
    </div>
    <div class="cards"></div>
  `;
  const cards = col.querySelector(".cards");

  layer.items.forEach(it => {
    const hasRepo = !!it.repo;
    const deployDoc = it.deployDoc === "NA" ? "" : it.deployDoc;
    const clickTarget = deployDoc || it.repo;
    const el = document.createElement(clickTarget ? "a" : "div");
    el.className = "card" + (hasRepo ? " hasrepo" : " norepo") + (it.w3f ? " w3f" : "");
    if (clickTarget) { el.href = clickTarget; el.target = "_blank"; el.rel = "noopener"; }

    const repoShort = it.repo ? (it.repoLabel || it.repo.replace("https://github.com/", "")) : "";
    const tags = [
      !hasRepo ? `<span class="tag">no repo</span>` : "",
      it.w3f ? `<span class="tag w3f">internal</span>` : "",
    ].filter(Boolean).join("");
    const tag = tags ? `<span class="tags">${tags}</span>` : "";
    const missingDoc = it.deployDoc ? "" : `<span class="doc-badge" title="Missing deploy doc">!</span>`;

    el.innerHTML = `
      ${missingDoc}
      <div class="name"><span class="label">${it.name}</span> ${tag}${clickTarget ? '<span class="arrow">↗</span>' : ""}</div>
      ${hasRepo ? `<div class="repo">${repoShort}</div>` : ""}
    `;
    cards.appendChild(el);
  });

  board.appendChild(col);
});
</script>
</body>
</html>
